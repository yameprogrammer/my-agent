version: '3.8'

services:
  db:
    # pgvector가 기본 탑재된 공식 pgvector 도커 이미지 사용
    image: ankane/pgvector:latest
    container_name: novel-agent-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: novel_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
    driver: local
